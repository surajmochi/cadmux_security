{% extends "base.html" %}
{% block title %}Login | Cadmux Security{% endblock %}
{% block body %}
<main class="auth-shell auth-shell-split">
  <section class="auth-card panel">
    <img src="{{ url_for('static', filename='logo.svg') }}" class="brand-logo" alt="Cadmux Security logo" />
    <h1>Sign in</h1>
    <p class="subtitle">Access your security dashboard</p>
    <form method="post" action="{{ url_for('login_submit') }}" class="auth-form">
      <label>Email
        <input type="email" name="email" required />
      </label>
      <label>Password
        <input type="password" name="password" required />
      </label>
      <button type="submit">Login</button>
    </form>
    <div class="auth-links">
      <a href="{{ url_for('register_page') }}">Create an account</a>
      <a href="{{ url_for('forgot_password_page') }}">Forgot password?</a>
    </div>
  </section>
</main>
{% endblock %}
