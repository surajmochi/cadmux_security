{% extends "base.html" %}
{% block title %}Forgot Password | Cadmux Security{% endblock %}
{% block body %}
<main class="auth-shell">
  <section class="auth-card panel">
    <img src="{{ url_for('static', filename='logo.svg') }}" class="brand-logo" alt="Cadmux Security logo" />
    <h1>Reset password</h1>
    <p class="subtitle">Set a new password for your account</p>
    <form method="post" action="{{ url_for('forgot_password_submit') }}" class="auth-form">
      <label>Registered Email
        <input type="email" name="email" required />
      </label>
      <label>New Password
        <input type="password" name="new_password" minlength="8" required />
      </label>
      <button type="submit">Reset password</button>
    </form>
    <div class="auth-links">
      <a href="{{ url_for('login') }}">Back to login</a>
    </div>
  </section>
</main>
{% endblock %}
